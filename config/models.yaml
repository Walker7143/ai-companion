minimax:
  api_key: "${MINIMAX_API_KEY}"
  base_url: "https://api.minimax.chat/v1"
  model: "MiniMax-M2.7"
  max_context_chars: 8000   # 模型上下文上限（字符数），超限触发压缩

memory:
  embedding: "none"          # "local" | "none"
  embedding_model: "all-MiniLM-L6-v2"  # sentence-transformers 模型名
  max_working_turns: 20       # 工作记忆保留轮数
  hard_limit_chars: 5000      # 硬上限，超限同步压缩
  soft_limit_chars: 3000      # 软上限，超限异步压缩
  semantic_char_limit: 4400    # 单条语义记忆事实的最大字符数（超限截断）

fallback:
  enabled: false
