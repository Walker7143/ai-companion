# ============================================
# 模型配置
# ============================================
# 设置默认 provider，其他 provider 也会被读取
# ============================================
model:
  provider: "minimax"          # 默认 provider: minimax | openai | claude | ollama | custom
  temperature: 0.8            # 全局默认温度
  max_tokens: 1024            # 全局默认最大 token

# ============================================
# MiniMax
# ============================================
minimax:
  api_key: "${MINIMAX_API_KEY}"
  base_url: "https://api.minimax.chat/v1"
  model: "MiniMax-M2.7"

# ============================================
# OpenAI
# ============================================
openai:
  api_key: "${OPENAI_API_KEY}"
  base_url: "https://api.openai.com/v1"
  model: "gpt-4o"

# ============================================
# Claude (Anthropic)
# ============================================
claude:
  api_key: "${ANTHROPIC_API_KEY}"
  base_url: "https://api.anthropic.com/v1"
  model: "claude-sonnet-4-20250514"

# ============================================
# Ollama (本地)
# ============================================
ollama:
  base_url: "http://localhost:11434"
  model: "qwen2.5:7b"

# ============================================
# 自定义模型
# ============================================
custom:
  - name: "deepseek-chat"
    api_url: "https://api.deepseek.com/v1/chat/completions"
    model: "deepseek-chat"
    auth_type: "bearer"
    api_key: "${DEEPSEEK_API_KEY}"

# ============================================
# 记忆系统配置
# ============================================
memory:
  embedding: "local"          # "local" | "none"
  embedding_model: "all-MiniLM-L6-v2"  # sentence-transformers 模型名
  max_working_turns: 20       # 工作记忆保留轮数
  hard_limit_chars: 5000      # 硬上限，超限同步压缩
  soft_limit_chars: 3000      # 软上限，异步压缩
  semantic_char_limit: 4400    # 单条语义记忆事实的最大字符数（超限截断）

# ============================================
# 上下文压缩配置
# ============================================
context:
  compressor:
    enabled: false           # 是否启用新的上下文压缩器（默认关闭，保持向后兼容）
    threshold_percent: 0.75   # 触发压缩的上下文比例（75% 时触发）
    tail_token_budget: 4000   # 尾部保留 token 数
    protect_first_n: 2         # 保护前 N 条消息不被压缩
    model_context: 128000      # 模型上下文上限

fallback:
  enabled: false

# ============================================
# 技能系统配置
# ============================================
skills:
  image_generation:
    model: "minimax"          # 默认模型：dalle | minimax | stable_diffusion | 自定义

    dalle:
      model: "dall-e-3"
    minimax:
      model: "image-01"
      output_dir: "data/bots/_images"
    stable_diffusion:
      model: "stable-diffusion-xl"
      api_url: "http://localhost:7860"

  tts:
    model: "minimax"

    minimax:
      model: "speech-2.8-hd"
      voice: "male-qn-qingse"
      speed: 1
      vol: 1
      pitch: 0
      sample_rate: 32000
      bitrate: 128000
      output_format: "hex"
      output_dir: "data/bots/_audio"

    edge_tts:
      voice: "zh-CN-XiaoxiaoNeural"

    azure_tts:
      voice: "zh-CN-XiaoxiaoNeural"
      api_url: "https://region.tts.speech.microsoft.com/cognitiveservices/v1"
      auth_type: "api_key"

    openai_tts:
      model: "tts-1"
      voice: "alloy"
      api_url: "https://api.openai.com/v1/audio/speech"
      auth_type: "bearer"

# ============================================
# 通道配置
# ============================================
channel:
  type: "cli"

  feishu:
    webhook_url: "${FEISHU_WEBHOOK_URL}"

  webhook:
    url: "${WEBHOOK_URL}"
